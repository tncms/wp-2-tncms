name: Bug report
description: Report a reproducible bug
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide exact steps.
    validations:
      required: true
  - type: input
    id: wp
    attributes:
      label: WordPress version
  - type: input
    id: php
    attributes:
      label: PHP version
  - type: input
    id: plugin
    attributes:
      label: Plugin version
